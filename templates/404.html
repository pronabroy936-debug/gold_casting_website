{% extends "layout.html" %}
{% block title %}Page Not Found | {{ site_name }}{% endblock %}
{% block content %}
<section class="flex min-h-[70vh] items-center justify-center px-4 py-10">
  <div class="w-full max-w-md rounded-lg border border-white/10 bg-white/[0.03] p-6 text-center">
    <h1 class="font-display text-6xl">404</h1>
    <p class="mt-3 text-white/65">The page you requested could not be found.</p>
    <a class="mt-5 inline-flex min-h-12 items-center justify-center rounded-md bg-gold px-5 font-semibold text-black transition hover:bg-goldSoft" href="{{ url_for('index') }}">Return Home</a>
  </div>
</section>
{% endblock %}
