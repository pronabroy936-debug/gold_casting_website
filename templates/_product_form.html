<form class="rounded-lg border border-white/10 bg-white/[0.03] p-5" method="post" enctype="multipart/form-data">
  <div class="grid gap-4 md:grid-cols-2">
    <div>
      <label class="mb-2 block text-sm text-white/70">Product Name</label>
      <input class="field" name="title" value="{{ product.title if product else '' }}" required>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">Category</label>
      <select class="field" name="category_id" required>
        {% for category in categories %}
        <option value="{{ category.id }}" {% if product and product.category_id == category.id %}selected{% endif %}>
          {{ category.parent.name }} / {{ category.name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">Price</label>
      <input class="field" name="price" type="number" step="0.01" value="{{ product.price if product else '' }}" required>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">Weight</label>
      <input class="field" name="weight" value="{{ product.weight if product else '' }}" required>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">Purity</label>
      <input class="field" name="purity" value="{{ product.purity if product else '' }}" required>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">WhatsApp Number</label>
      <input class="field" name="whatsapp_number" value="{{ product.whatsapp_number if product else '919999999999' }}" required>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">Availability</label>
      <select class="field" name="availability_status" required>
        {% for status in ["Available", "Made to Order", "Sold Out"] %}
        <option value="{{ status }}" {% if product and product.availability_status == status %}selected{% endif %}>{{ status }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="mb-2 block text-sm text-white/70">Main Image</label>
      <input class="field file:mr-4 file:rounded-md file:border-0 file:bg-gold file:px-4 file:py-2 file:font-semibold file:text-black" type="file" name="image" accept=".png,.jpg,.jpeg,.webp" {% if not product %}required{% endif %}>
    </div>
    <div class="md:col-span-2">
      <label class="mb-2 block text-sm text-white/70">Description</label>
      <textarea class="field min-h-36" rows="5" name="description" required>{{ product.description if product else '' }}</textarea>
    </div>
    <div class="md:col-span-2">
      <label class="mb-2 block text-sm text-white/70">Gallery Images</label>
      <input class="field file:mr-4 file:rounded-md file:border-0 file:bg-gold file:px-4 file:py-2 file:font-semibold file:text-black" type="file" name="gallery_images" accept=".png,.jpg,.jpeg,.webp" multiple>
    </div>
  </div>
  <button class="mt-5 inline-flex min-h-12 items-center justify-center rounded-md bg-gold px-5 font-semibold text-black transition hover:bg-goldSoft">Save Product</button>
</form>
