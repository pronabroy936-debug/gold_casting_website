<article class="group flex h-full flex-col overflow-hidden rounded-lg border border-white/10 bg-white/[0.03] transition hover:-translate-y-1 hover:border-gold/50 hover:shadow-luxe">
  <a class="block flex-1" href="{{ url_for('product_detail', slug=product.slug) }}">
    <div class="aspect-square overflow-hidden bg-black/30">
      {% if product.image %}
      <img class="h-full w-full object-cover transition duration-300 group-hover:scale-105" src="{{ url_for('static', filename='uploads/products/' ~ product.image) }}" alt="{{ product.title }}">
      {% else %}
      <div class="flex h-full items-center justify-center text-sm text-white/45">No Image</div>
      {% endif %}
    </div>
    <div class="space-y-2 p-4">
      <span class="text-[11px] font-bold uppercase tracking-[0.18em] text-silver">{{ product.category.metal_type }} / {{ product.category.name }}</span>
      <h3 class="font-display text-2xl leading-none">{{ product.title }}</h3>
      <div class="flex items-center justify-between gap-3">
        <strong class="text-goldSoft">&#8377;{{ "%.2f"|format(product.price) }}</strong>
        <em class="text-xs not-italic text-white/50">{{ product.availability_status }}</em>
      </div>
    </div>
  </a>
  <div class="grid grid-cols-2 gap-2 p-4 pt-0">
    <a class="inline-flex min-h-11 items-center justify-center rounded-md border border-white/15 px-3 text-sm font-semibold transition hover:border-gold/50 hover:text-goldSoft" href="{{ url_for('product_detail', slug=product.slug) }}">View Details</a>
    <a class="inline-flex min-h-11 items-center justify-center rounded-md bg-gold px-3 text-sm font-semibold text-black transition hover:bg-goldSoft" target="_blank" href="{{ whatsapp_link(product) }}">Inquire</a>
  </div>
</article>
